<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center mb-4 fw-bold">StudySync Planner</h1>

    <!-- LOGIN -->
    <div id="loginSection" class="card shadow p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center mb-3">Login</h3>

        <input id="loginUser" class="form-control mb-2" placeholder="Username">
        <input id="loginPass" type="password" class="form-control mb-3" placeholder="Password">

        <button id="loginBtn" class="btn btn-primary w-100">Login</button>

        <p class="text-center mt-3">
            No account? <a href="#" id="showSignupLink">Sign up</a>
        </p>
    </div>

    <!-- SIGNUP -->
    <div id="signupSection" class="card shadow p-4 mx-auto d-none" style="max-width: 400px;">
        <h3 class="text-center mb-3">Create Account</h3>

        <input id="signupUser" class="form-control mb-2" placeholder="Choose a username">
        <input id="signupPass" type="password" class="form-control mb-3" placeholder="Choose a password">

        <button id="signupBtn" class="btn btn-success w-100">Sign Up</button>

        <p class="text-center mt-3">
            Already have an account? <a href="#" id="showLoginLink">Login</a>
        </p>
    </div>

    <!-- DASHBOARD -->
    <div id="plannerSection" class="card shadow p-4 mx-auto d-none" style="max-width: 700px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Welcome, <span id="currentUser"></span></h3>
            <button id="logoutBtn" class="btn btn-outline-danger">Logout</button>
        </div>

        <h5>Add Task</h5>

        <div class="row g-2 mb-3">
            <div class="col-md-4"><input id="subject" class="form-control" placeholder="Subject"></div>
            <div class="col-md-4"><input id="task" class="form-control" placeholder="Task"></div>
            <div class="col-md-4"><input id="due" type="date" class="form-control"></div>
        </div>

        <button id="addTaskBtn" class="btn btn-primary w-100 mb-4">Add Task</button>

        <h5>Your Tasks</h5>
        <div id="taskList" class="mt-3"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/static/app.js"></script>

</body>
</html>
